<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tham gia phòng thi - Thầy và Trò</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.apple-cloudkit.com/ck/2/cloudkit.js"></script>
    <style>
        /* Hiệu ứng nền Gradient giống SwiftUI */
        body {
            background: linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%);
            min-height: 100vh;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Hiệu ứng kính mờ (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
        }
        /* Nút bấm Gradient */
        .btn-gradient {
            background: linear-gradient(to right, #0d9488, #2563eb); /* Teal to Blue */
            transition: all 0.3s ease;
        }
        .btn-gradient:active {
            transform: scale(0.96);
        }
        /* Ẩn các màn hình không cần thiết */
        .hidden-state { display: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="state-input" class="glass-card w-full max-w-md p-8 shadow-2xl transition-all duration-500 text-center">
        <div class="flex justify-center mb-6">
            <div class="bg-gradient-to-br from-red-500 to-blue-500 p-4 rounded-full shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-black mb-1">Tham Gia Kiểm Tra</h1>
        <p class="text-sm text-gray-300 mb-6">Nhập thông tin để vào phòng thi Live</p>

        <form id="joinForm" class="space-y-4">
            <div>
                <input type="text" id="roomCode" placeholder="MÃ PHÒNG (6 SỐ)" maxlength="6" required
                    class="w-full bg-white/10 border border-white/30 text-white text-center font-mono text-2xl font-bold rounded-full py-3 px-6 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-white/50 uppercase">
            </div>
            
            <div>
                <input type="text" id="studentName" placeholder="Họ và tên của bạn" required
                    class="w-full bg-white/10 border border-teal-500/50 text-white rounded-full py-3 px-6 focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-white/50">
            </div>

            <div>
                <input type="text" id="studentId" placeholder="Mã số học sinh / sinh viên" required
                    class="w-full bg-white/10 border border-teal-500/50 text-white rounded-full py-3 px-6 focus:outline-none focus:ring-2 focus:ring-teal-400 placeholder-white/50">
            </div>

            <button type="submit" id="submitBtn"
                class="btn-gradient w-full text-white font-bold text-lg rounded-full py-4 mt-4 shadow-lg hover:shadow-xl">
                Vào Phòng
            </button>
        </form>
    </div>

    <div id="state-waiting" class="hidden-state glass-card w-full max-w-md p-8 shadow-2xl text-center">
        <div class="flex justify-center mb-6">
            <div class="bg-orange-500/80 p-6 rounded-full animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
        <h2 class="text-2xl font-black text-white mb-2">Đang chờ phê duyệt</h2>
        <p class="text-gray-300 mb-8">Vui lòng đợi giáo viên xác nhận để bắt đầu làm bài kiểm tra.</p>
        
        <button id="cancelBtn" class="bg-white/10 border border-white/30 text-white font-bold rounded-full py-3 px-8 hover:bg-white/20 transition">
            Thoát
        </button>
    </div>

    <script>
        // Lấy các tham chiếu UI
        const stateInput = document.getElementById('state-input');
        const stateWaiting = document.getElementById('state-waiting');
        const joinForm = document.getElementById('joinForm');
        const roomCodeInput = document.getElementById('roomCode');
        const cancelBtn = document.getElementById('cancelBtn');

        // Bước 1: Tự động lấy Mã phòng nếu học sinh bấm vào link có chứa ?room=123456
        const urlParams = new URLSearchParams(window.location.search);
        const urlRoomCode = urlParams.get('room');
        if (urlRoomCode) {
            roomCodeInput.value = urlRoomCode.toUpperCase();
            roomCodeInput.setAttribute('readonly', true);
            roomCodeInput.classList.add('opacity-70'); // Làm mờ nhẹ để báo hiệu không sửa được
        }

        // Bước 2: Xử lý sự kiện bấm nút "Vào phòng"
        joinForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Ngăn trình duyệt load lại trang

            const code = roomCodeInput.value;
            const name = document.getElementById('studentName').value;
            const id = document.getElementById('studentId').value;

            // Đổi giao diện sang trạng thái chờ
            stateInput.classList.add('hidden-state');
            stateWaiting.classList.remove('hidden-state');

            // TODO: Kết nối CloudKit JS ở đây trong tương lai
            console.log("Học sinh yêu cầu vào phòng:", { room: code, name: name, studentId: id });
            
            // Chỗ này sau này bạn sẽ gọi lệnh lưu dữ liệu học sinh (Trạng thái "pending") lên CloudKit Public Database.
        });

        // Xử lý nút Thoát
        cancelBtn.addEventListener('click', function() {
            stateWaiting.classList.add('hidden-state');
            stateInput.classList.remove('hidden-state');
        });
    </script>
</body>
</html>
