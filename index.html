<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bài Tập Trực Tuyến - Thầy và Trò</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.apple-cloudkit.com/ck/2/cloudkit.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%);
            min-height: 100vh; color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
        }
        .btn-gradient { background: linear-gradient(to right, #0d9488, #2563eb); transition: all 0.3s; }
        .btn-gradient:active { transform: scale(0.96); }
        .hidden-state { display: none !important; }
        .option-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); transition: all 0.2s; }
        .option-btn.selected { background: rgba(20, 184, 166, 0.25); border-color: #14b8a6; box-shadow: 0 0 15px rgba(20, 184, 166, 0.3); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div id="state-input" class="glass-card w-full max-w-md p-8 shadow-2xl text-center">
        <h1 class="text-2xl font-black mb-1">Tham Gia Bài Tập</h1>
        <p class="text-sm text-gray-300 mb-6" id="status-text">Đang kết nối hệ thống...</p>
        
        <form id="joinForm" class="space-y-4">
            <input type="text" id="roomCode" placeholder="MÃ PHÒNG" maxlength="6" required class="w-full bg-gray-800/40 border border-white/10 text-white text-center font-mono text-2xl font-bold rounded-full py-3 px-6 uppercase opacity-70" readonly>
            <input type="text" id="studentName" placeholder="Họ và tên học sinh" required class="w-full bg-white/10 border border-white/30 text-white text-center rounded-full py-3 px-6 focus:ring-2 focus:ring-cyan-400">
            <input type="text" id="studentId" placeholder="Mã số sinh viên (VD: SV001)" required class="w-full bg-white/10 border border-cyan-400/50 text-white text-center rounded-full py-3 px-6 focus:ring-2 focus:ring-cyan-400">
            <button type="submit" id="startBtn" class="btn-gradient w-full text-white font-bold text-lg rounded-full py-4 shadow-md" disabled>Bắt Đầu Làm Bài</button>
        </form>
    </div>

    <div id="state-exam" class="hidden-state w-full max-w-2xl pb-24">
        <div class="glass-card p-4 mb-6 flex justify-between items-center sticky top-4 z-50 shadow-xl">
            <div class="text-white font-bold text-lg">Tiến độ: <span id="progress-text" class="text-cyan-400">0/0</span></div>
            <button id="finishBtn" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2.5 rounded-full font-bold">Nộp Bài</button>
        </div>
        <div id="questions-container" class="space-y-6"></div>
    </div>

    <div id="state-result" class="hidden-state glass-card w-full max-w-md p-8 shadow-2xl text-center">
        <div class="text-6xl mb-4">🎉</div>
        <h2 class="text-3xl font-black text-white mb-2">Đã Nộp Bài!</h2>
        <p class="text-gray-300 mb-6">Kết quả đã được gửi thẳng vào sổ điểm của Giáo viên.</p>
        <div class="bg-white/10 p-6 rounded-2xl border border-white/10">
            <div class="text-sm text-gray-400 font-bold uppercase">Điểm Số Của Bạn</div>
            <div id="final-score" class="text-6xl font-black text-teal-400 mt-2">0.0</div>
            <div id="final-correct" class="text-green-400 font-medium mt-2">0/0 Câu đúng</div>
        </div>
    </div>

    <script>
        let examQuestions = [];
        let studentAnswers = {}; 
        let activeRoomRecordName = null;

        // CloudKit JS chỉ dùng để ĐỌC đề thi (Rất an toàn)
        CloudKit.configure({
            containers: [{
                containerIdentifier: 'iCloud.com.mipham.testeduviet',
                apiTokenAuth: { apiToken: 'debcca1ac08a3645258f6c48b1c5b94fe5214cd060912ef8447b8d92fd9020ef' },
                environment: 'development'
            }]
        });
        const publicDB = CloudKit.getDefaultContainer().publicCloudDatabase;

        // Tự động load đề từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('room');
        if (code) {
            document.getElementById('roomCode').value = code.toUpperCase();
            loadExamData(code.toUpperCase());
        } else {
            document.getElementById('status-text').innerText = "Vui lòng truy cập bằng Link của giáo viên!";
        }

        async function loadExamData(roomCode) {
            try {
                const query = { recordType: 'GameRoom', filterBy: [{ fieldName: 'roomCode', comparator: 'EQUALS', fieldValue: { value: roomCode, type: 'STRING' } }] };
                const res = await publicDB.performQuery(query);
                if (res.records.length === 0) throw new Error("Phòng không tồn tại");
                
                activeRoomRecordName = res.records[0].recordName;
                examQuestions = JSON.parse(res.records[0].fields.questionData.value);
                
                document.getElementById('status-text').innerText = "Đã lấy đề thi thành công. Vui lòng nhập thông tin!";
                document.getElementById('startBtn').disabled = false;
            } catch (e) {
                document.getElementById('status-text').innerText = "Lỗi lấy đề thi: " + e.message;
            }
        }

        // Bấm Bắt đầu làm bài
        document.getElementById('joinForm').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('state-input').classList.add('hidden-state');
            document.getElementById('state-exam').classList.remove('hidden-state');
            renderExam();
        });

        function renderExam() {
            const container = document.getElementById('questions-container');
            container.innerHTML = "";
            document.getElementById('progress-text').innerText = `0/${examQuestions.length}`;

            examQuestions.forEach((q, index) => {
                studentAnswers[q.id] = []; 
                let html = `<div class="glass-card p-6 w-full"><div class="text-cyan-400 font-bold mb-1">Câu ${index + 1}</div><div class="text-lg font-bold mb-4">${cleanText(q.content)}</div><div class="space-y-3">`;
                q.options.forEach(opt => {
                    const cleanOpt = cleanText(opt);
                    html += `<button onclick="selectOption('${q.id}', '${cleanOpt}', this)" class="option-btn w-full text-left px-5 py-4 rounded-xl font-medium">${cleanOpt}</button>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function cleanText(txt) { return txt.replace(/^Câu\s*\d+[\:\.\-]\s*/i, '').replace(/^[A-Z][\.\/\)\-]\s*/, '').trim(); }

        function selectOption(questionId, selectedValue, btnElement) {
            Array.from(btnElement.parentElement.children).forEach(c => c.classList.remove('selected'));
            btnElement.classList.add('selected');
            studentAnswers[questionId] = [selectedValue];
            let answered = Object.values(studentAnswers).filter(a => a.length > 0).length;
            document.getElementById('progress-text').innerText = `${answered}/${examQuestions.length}`;
        }

        // NỘP BÀI GỌI VERCEL API
        document.getElementById('finishBtn').addEventListener('click', async () => {
            if(!confirm("Xác nhận nộp bài?")) return;
            
            const btn = document.getElementById('finishBtn');
            btn.innerText = "Đang nộp..."; btn.disabled = true;

            let correctCount = 0;
            examQuestions.forEach(q => {
                const myAns = studentAnswers[q.id] || [];
                const correctAns = q.correctAnswer.map(ans => cleanText(ans));
                if (myAns.length > 0 && myAns[0].toLowerCase() === correctAns[0].toLowerCase()) correctCount++;
            });
            const totalScore = (correctCount / examQuestions.length) * 10.0;

            const payload = {
                roomRecordName: activeRoomRecordName,
                studentName: document.getElementById('studentName').value,
                studentCode: document.getElementById('studentId').value.toUpperCase(), // Gửi ID lên API
                correctCount: correctCount,
                totalScore: totalScore
            };

            try {
                // GỌI API BÍ MẬT CỦA BẠN
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(!res.ok) throw new Error("Lỗi API");

                document.getElementById('state-exam').classList.add('hidden-state');
                document.getElementById('state-result').classList.remove('hidden-state');
                document.getElementById('final-score').innerText = totalScore.toFixed(1);
                document.getElementById('final-correct').innerText = `${correctCount}/${examQuestions.length} Câu đúng`;
                
            } catch(e) {
                alert("Lỗi nộp bài, hãy thử lại!");
                btn.innerText = "Nộp Bài"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
